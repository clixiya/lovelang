name: publish-npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (example: v1.0.0)"
        required: true
        type: string
      publish:
        description: "Publish to npm (false = dry run only)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}
  PACKAGE_DIR: npm/lovelang-runtime

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install npm package dependencies without postinstall
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm install --ignore-scripts

      - name: Run package tests
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm test

      - name: Verify package version matches tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./${PACKAGE_DIR}/package.json').version")
          if [ "v${VERSION}" != "${RELEASE_TAG}" ]; then
            echo "Tag ${RELEASE_TAG} does not match package version v${VERSION}"
            exit 1
          fi

      - name: Dry run package preview
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'true' }}
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm pack --dry-run

      - name: Publish package to npm
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        working-directory: ${{ env.PACKAGE_DIR }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required for npm publish"
            exit 1
          fi
          npm whoami
          if npm publish --access public --provenance; then
            echo "Published with provenance"
          else
            echo "Publish with provenance failed; retrying without provenance"
            npm publish --access public
          fi
